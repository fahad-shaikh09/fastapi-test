apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fastapi-test
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/fahad-shaikh09/backstage
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: fastapi-test

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true